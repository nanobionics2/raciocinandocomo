              <button type="submit" class="flex-1 inline-flex justify-center items-center px-6 py-4 rounded-2xl bg-gradient-to-r from-accent to-sky-400 text-brand font-extrabold hover:brightness-105 transition">
                Enviar e abrir WhatsApp
              </button>
              <button id="downloadJSON" type="button" class="flex-1 inline-flex justify-center items-center px-6 py-4 rounded-2xl bg-white/5 hover:bg-white/10 border border-white/10 transition">
                Baixar dados (JSON)
              </button>
            </div>

            <div id="formMsg" class="hidden rounded-2xl p-4 border border-white/10 bg-black/20 text-sm text-white/75"></div>

            <p class="text-xs text-white/55">
              Ao enviar, você concorda em receber informações do ciclo via WhatsApp/e-mail. Você pode solicitar remoção a qualquer momento.
            </p>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="py-10 text-center text-white/50 text-sm border-t border-white/10">
    © <span id="year"></span> Raciocinando Como — Todos os direitos reservados.
  </footer>

  <!-- TOAST -->
  <div id="toast" class="fixed left-1/2 -translate-x-1/2 bottom-5 z-[60] hidden px-4 py-3 rounded-2xl glass wa-bubble text-sm text-white/85">
    Copiado.
  </div>

  <script>
    // =========================
    // CONFIG (AJUSTE AQUI)
    // =========================
    const CONFIG = {
      waDigits: "5591999999999",          // "55DDDNUMERO" (apenas dígitos)
      waDisplay: "+55 (91) 99999-9999",   // só para exibir no widget

      // Data limite do ciclo (contador). Ajuste livremente:
      countdownTo: "2026-04-01T23:59:59-03:00",

      programName: "Raciocinando Como",
      prices: {
        start: "R$ 1.500 a R$ 3.000",
        autonomy: "R$ 3.000 a R$ 6.000",
        founders: "R$ 8.000 a R$ 15.000"
      }
    };

    // =========================
    // Helpers
    // =========================
    const $ = (s, el=document) => el.querySelector(s);
    const $$ = (s, el=document) => Array.from(el.querySelectorAll(s));

    function toast(msg="Copiado.") {
      const t = $("#toast");
      t.textContent = msg;
      t.classList.remove("hidden");
      clearTimeout(window.__t);
      window.__t = setTimeout(() => t.classList.add("hidden"), 2200);
    }

    function onlyDigits(s){ return (s || "").replace(/\D/g,""); }

    function waLink(message) {
      return `https://wa.me/${CONFIG.waDigits}?text=${encodeURIComponent(message)}`;
    }

    async function copyText(text){
      try {
        await navigator.clipboard.writeText(text);
        toast("Copiado.");
      } catch(e) {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        toast("Copiado.");
      }
    }

    function updateWAButtons(){
      $("#waDisplay").textContent = CONFIG.waDisplay;

      const baseMsg =
`Olá! Quero detalhes do programa *${CONFIG.programName}*.
Pode me enviar: ementa completa, trilhas por perfil e explicação dos planos (Start / Autonomia / Fundadores)?`;

      const link = waLink(baseMsg);

      $("#waOpen").href = link;
      $("#hero-wa").href = link;
      $("#nav-wa").href = link;
      $("#urg-wa").href = link;
      $("#openTemplate").href = waLink($("#waTemplate").textContent.trim());
    }

    // =========================
    // Reveal on scroll
    // =========================
    function initReveal(){
      const io = new IntersectionObserver((entries)=>{
        entries.forEach(e=>{
          if(e.isIntersecting){
            e.target.classList.add("in");
            io.unobserve(e.target);
          }
        });
      }, {threshold: 0.14});
      $$(".reveal").forEach(el=>io.observe(el));
    }

    // =========================
    // Countdown
    // =========================
    function startCountdown(){
      const target = new Date(CONFIG.countdownTo).getTime();
      const dd = $("#dd"), hh=$("#hh"), mm=$("#mm"), ss=$("#ss");
      function tick(){
        const now = Date.now();
        let diff = Math.max(0, target - now);
        const d = Math.floor(diff / (1000*60*60*24)); diff -= d*(1000*60*60*24);
        const h = Math.floor(diff / (1000*60*60)); diff -= h*(1000*60*60);
        const m = Math.floor(diff / (1000*60)); diff -= m*(1000*60);
        const s = Math.floor(diff / 1000);

        dd.textContent = String(d);
        hh.textContent = String(h).padStart(2,"0");
        mm.textContent = String(m).padStart(2,"0");
        ss.textContent = String(s).padStart(2,"0");
      }
      tick();
      setInterval(tick, 1000);
    }

    // =========================
    // Accordion
    // =========================
    function initAccordion(){
      $$("[data-acc]").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          const id = btn.getAttribute("data-acc");
          const panel = $("#"+id);
          const sign = btn.querySelector("span:last-child");
          const isOpen = !panel.classList.contains("hidden");

          $$("[data-acc]").forEach(b=>{
            const pid = b.getAttribute("data-acc");
            $("#"+pid).classList.add("hidden");
            const s = b.querySelector("span:last-child");
            if(s) s.textContent = "+";
          });

          if(!isOpen){
            panel.classList.remove("hidden");
            if(sign) sign.textContent = "—";
          }
        });
      });
    }

    // =========================
    // Tabs
    // =========================
    function initTabs(){
      const btns = $$(".tabBtn");
      btns.forEach(b=>{
        b.addEventListener("click", ()=>{
          btns.forEach(x=>{
            x.classList.remove("bg-white/10");
            x.classList.add("bg-white/5");
          });
          b.classList.add("bg-white/10");
          b.classList.remove("bg-white/5");

          const id = b.getAttribute("data-tab");
          $$(".tabPanel").forEach(p=>p.classList.add("hidden"));
          $("#"+id).classList.remove("hidden");
        });
      });
    }

    // =========================
    // WhatsApp widget open/minimize
    // =========================
    function initWAWidget(){
      const waCard = $("#waCard");
      const waMini = $("#waMini");
      $("#waClose").addEventListener("click", ()=>{
        waCard.classList.add("hidden");
        waMini.classList.remove("hidden");
      });
      waMini.addEventListener("click", ()=>{
        waMini.classList.add("hidden");
        waCard.classList.remove("hidden");
      });

      $("#waCopy").addEventListener("click", ()=>{
        const msg =
`Olá! Quero detalhes do programa *${CONFIG.programName}*.
Pode me enviar: ementa completa, trilhas por perfil e explicação dos planos (Start / Autonomia / Fundadores)?`;
        copyText(msg);
      });

      $("#copyTemplate").addEventListener("click", ()=>{
        copyText($("#waTemplate").textContent.trim());
      });
    }

    // =========================
    // Fill prices + year
    // =========================
    function fillPrices(){
      $("#priceStart").textContent = CONFIG.prices.start;
      $("#priceAutonomy").textContent = CONFIG.prices.autonomy;
      $("#priceFounders").textContent = CONFIG.prices.founders;
      $("#year").textContent = new Date().getFullYear();
    }

    // =========================
    // Form -> WhatsApp funnel
    // =========================
    function initForm(){
      const form = $("#applyForm");
      const msgBox = $("#formMsg");

      function readData(){
  return {
    name: $("#fName").value.trim(),
    age: $("#fAge").value.trim(),
    email: $("#fEmail").value.trim(),
    whatsapp: $("#fWhats").value.trim(),
    profile: $("#fProfile").value,
    level: $("#fLevel").value,
    track: $("#fTrack").value,
    goal: $("#fGoal").value.trim(),
    context: $("#fContext").value.trim(),
  };
}

      function validate(d){
        const errs = [];
        if(!d.name) errs.push("Nome");
        if(!d.age || isNaN(Number(d.age)) || Number(d.age) < 14 || Number(d.age) > 99) errs.push("Idade");
        if(!d.email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(d.email)) errs.push("E-mail");
        if(onlyDigits(d.whatsapp).length < 10) errs.push("WhatsApp");
        if(!d.profile) errs.push("Perfil");
        if(!d.level) errs.push("Plano");
if(!d.track) errs.push("Trilha");
        if(!d.goal || d.goal.length < 20) errs.push("Objetivo (mín. 20 caracteres)");
        if(!d.context || d.context.length < 20) errs.push("Contexto (mín. 20 caracteres)");
        return errs;
      }

      function buildMessage(d){
  const lines = [];
  lines.push(`Olá! Quero aplicar para *${CONFIG.programName}*.`);
  lines.push(`Plano desejado: *${d.level}*`);
  lines.push(`Trilha desejada: *${d.track}*`);
  lines.push("");
  lines.push("*Resumo do perfil:*");
  lines.push(`• Nome: ${d.name} | Idade: ${d.age}`);
  lines.push(`• Perfil: ${d.profile}`);
  lines.push(`• WhatsApp: ${d.whatsapp} | E-mail: ${d.email}`);
  lines.push("");
  lines.push("*Objetivo:*");
  lines.push(d.goal);
  lines.push("");
  lines.push("*Contexto atual:*");
  lines.push(d.context);
  lines.push("");
  lines.push("Pode me enviar a ementa completa, a melhor combinação de trilhas e os próximos passos?");
  return lines.join("\n");
}

      form.addEventListener("submit", (e)=>{
        e.preventDefault();
        msgBox.classList.add("hidden");
        const d = readData();
        const errs = validate(d);
        if(errs.length){
          msgBox.textContent = "Revise: " + errs.join(", ");
          msgBox.classList.remove("hidden");
          return;
        }

        const link = waLink(buildMessage(d));
        msgBox.textContent = "Abrindo WhatsApp com sua mensagem pronta…";
        msgBox.classList.remove("hidden");
        window.open(link, "_blank", "noopener,noreferrer");
      });

      $("#downloadJSON").addEventListener("click", ()=>{
        const d = readData();
        const blob = new Blob([JSON.stringify(d, null, 2)], {type:"application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "candidatura_raciocinando_como.json";
        a.click();
        URL.revokeObjectURL(url);
      });
    }

    // =========================
    // Init
    // =========================
    (function init(){
      fillPrices();
      updateWAButtons();
      initReveal();
      initAccordion();
      initTabs();
      initWAWidget();
      startCountdown();
      initForm();
    })();
  </script>
</body>
</html>
